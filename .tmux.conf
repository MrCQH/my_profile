# ==================== 基础设置 ====================
# 启用扩展键支持（修复 Enter 键等修饰键问题）
set -g extended-keys on
set -g extended-keys-format csi-u

# 将前缀键改为 Ctrl-a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 支持真彩色
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# 从 1 开始编号窗口和 pane
set -g base-index 1
setw -g pane-base-index 1

# 自动重命名窗口
setw -g automatic-rename on
set -g renumber-windows on

# 历史记录
set -g history-limit 100000

# 缩短 escape 延迟（Vim 切换模式更流畅）
set -sg escape-time 0

# 启用 focus events（Vim autoread 等功能需要）
set -g focus-events on

# ==================== 鼠标支持 ====================
set -g mouse on

bind -T copy-mode-vi MouseDrag1Pane send -X begin-selection
bind -T copy-mode-vi MouseDown1Pane send -X clear-selection
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line

# 鼠标滚轮：自动进入 copy-mode
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# 鼠标拖拽结束后自动复制到系统剪贴板
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "pbcopy"

# ==================== Vim 风格复制模式 ====================
setw -g mode-keys vi

# OSC 52 剪贴板支持（SSH 远程场景下终端直接写入本地剪贴板）
set -g set-clipboard on

# 进入复制模式：前缀 + Escape（vim 习惯）
# 如果有上次搜索记录，光标自动跳转到匹配位置；否则保持默认位置
bind Escape copy-mode \; send-keys -X search-again

# v 开始选择，V 行选择，C-v 块选择
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

# p 粘贴
bind p paste-buffer
bind P choose-buffer

# Escape / q 退出复制模式
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi q send -X cancel

# 翻页（vim 风格）
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down
bind -T copy-mode-vi C-f send -X page-down
bind -T copy-mode-vi C-b send -X page-up

# 行首行尾（vim 风格）
bind -T copy-mode-vi 0 send -X start-of-line
bind -T copy-mode-vi ^ send -X back-to-indentation
bind -T copy-mode-vi '$' send -X end-of-line

# 搜索增强
bind -T copy-mode-vi / command-prompt -i -p "(search down)" "send -X search-forward-incremental \"%%%\""
bind -T copy-mode-vi ? command-prompt -i -p "(search up)" "send -X search-backward-incremental \"%%%\""

# 智能剪贴板检测：按优先级检测 macOS / WSL / Wayland / X11 环境
# 在 tmux 加载时运行一次，动态绑定 y / Y / MouseDragEnd 到正确的剪贴板工具
run-shell ' \
    if command -v pbcopy >/dev/null 2>&1; then \
        CLIP="pbcopy"; \
    elif [ -n "$WSL_DISTRO_NAME" ] && command -v clip.exe >/dev/null 2>&1; then \
        CLIP="clip.exe"; \
    elif [ -n "$WAYLAND_DISPLAY" ] && command -v wl-copy >/dev/null 2>&1; then \
        CLIP="wl-copy"; \
    elif command -v xclip >/dev/null 2>&1; then \
        CLIP="xclip -in -selection clipboard"; \
    elif command -v xsel >/dev/null 2>&1; then \
        CLIP="xsel --clipboard --input"; \
    else \
        CLIP=""; \
    fi; \
    if [ -n "$CLIP" ]; then \
        tmux bind -T copy-mode-vi y send-keys -X copy-pipe "$CLIP"; \
        tmux bind -T copy-mode-vi Y send-keys -X copy-pipe "$CLIP"; \
        tmux bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "$CLIP"; \
    else \
        tmux bind -T copy-mode-vi y send-keys -X copy-selection; \
        tmux bind -T copy-mode-vi Y send-keys -X copy-selection; \
        tmux bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection; \
    fi \
'

# ==================== Pane 操作（Vim 风格） ====================
# 前缀 + h/j/k/l 切换 pane
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 前缀 + H/J/K/L 调整 pane 大小（可重复按）
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 更精细的调整（前缀 + Alt-h/j/k/l）
bind -r M-h resize-pane -L 1
bind -r M-j resize-pane -D 1
bind -r M-k resize-pane -U 1
bind -r M-l resize-pane -R 1

# 无前缀 Alt+h/j/k/l 快速切换 pane（与 vim-tmux-navigator 类似）
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Vim 风格分割 pane
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# 保留 session 选择功能（用 S 代替被 s 占用的默认键）
bind S choose-tree -s

# ==================== 窗口操作 ====================
# 前缀 + C-h/C-l 切换窗口（可重复按）
bind -r C-h previous-window
bind -r C-l next-window

# 前缀 + Tab 切换到上一个窗口
bind Tab last-window

# 交换窗口位置
bind -r < swap-window -t -1 \; previous-window
bind -r > swap-window -t +1 \; next-window

# ==================== 实用功能 ====================
# 快速重载配置
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# synchronize-panes
bind C-x setw synchronize-panes \; display "synchronize-panes is now #{?pane_synchronized,on,off}"

# 快速切换 pane 最大化/还原
bind m resize-pane -Z

# 新建窗口保持当前路径
bind c new-window -c "#{pane_current_path}"

# ==================== 状态栏美化 ====================
set -g status on
set -g status-interval 1
set -g status-justify centre

set -g status-left-length 50
set -g status-left "#[fg=green][#S] #[fg=yellow]#I:#P "

set -g status-right-length 50
set -g status-right "#[fg=cyan]%Y-%m-%d %H:%M #[fg=magenta]#H"

setw -g window-status-format " #I:#W#F "
setw -g window-status-current-format "#[bold] #I:#W#F "
setw -g window-status-current-style fg=brightwhite,bg=blue

set -g status-style fg=white,bg=black

# Incremental search - 光标直接跳到关键词位置
bind-key -T copy-mode-vi / command-prompt -i -p "(search down)" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -p "(search up)" "send -X search-backward-incremental \"%%%\""

bind-key -T copy-mode-vi n send-keys -X search-again
bind-key -T copy-mode-vi N send-keys -X search-reverse


# ==================== 插件 ====================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.tmux/plugins/tpm/tpm'
